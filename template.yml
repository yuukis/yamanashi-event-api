AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31

Parameters:
  ConnpassApiKey:
    Type: String
    Description: "API key for Connpass integration"
  EventsRefreshToken:
    Type: String
    Default: ""
    NoEcho: true
    Description: "Shared secret required to call POST /events/refresh. Leave empty to disable the endpoint."
  EventsRefreshMinIntervalSeconds:
    Type: String
    Default: "60"
    Description: "Minimum seconds between accepted POST /events/refresh calls"

Resources:
  FastApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: eventapi-lambda
      Handler: app.main.lambda_handler
      Runtime: python3.10
      MemorySize: 512
      Timeout: 30
      Environment:
        Variables:
          CONNPASS_API_KEY: !Ref ConnpassApiKey
          EVENTS_REFRESH_TOKEN: !Ref EventsRefreshToken
          EVENTS_REFRESH_MIN_INTERVAL_SECONDS: !Ref EventsRefreshMinIntervalSeconds
      Policies:
        - AWSLambdaBasicExecutionRole
      Events:
        ApiGateway:
          Type: Api
          Properties:
            Path: /{proxy+}
            Method: ANY
